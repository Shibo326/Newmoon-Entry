name: CI

on:
  push:
    branches: [main, dev1]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm test

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build

  verify-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify contract source exists
        run: |
          test -f contracts/nightscore.compact
          echo "Contract source: contracts/nightscore.compact"
      - name: Verify compiled output exists
        run: |
          test -f managed/compiler/contract-info.json
          test -f managed/contract/index.js
          test -f managed/contract/index.d.ts
          test -d managed/keys
          test -d managed/zkir
          echo "Compiled output verified in managed/"
      - name: Verify circuit definitions
        run: |
          grep -q "computeScore" contracts/nightscore.compact
          grep -q "verifyThreshold" contracts/nightscore.compact
          echo "Both circuits present in contract"
