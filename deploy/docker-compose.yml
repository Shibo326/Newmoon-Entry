# Proof server for NightScore contract deployment to public networks.
# The proof server generates ZK proofs locally — your private witness data
# never leaves your machine.
#
# Start: docker compose up -d
# Stop:  docker compose down
name: nightscore-proof-server

services:
  proof-server:
    image: midnightntwrk/proof-server:8.0.3
    container_name: nightscore-proof-server
    command: ["midnight-proof-server -v"]
    ports:
      - "6300:6300"
    environment:
      RUST_BACKTRACE: "full"
