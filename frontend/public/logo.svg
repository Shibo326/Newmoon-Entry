    <linearGradient id="shieldGrad" x1="18" y1="12" x2="46" y2="53">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0a2e"/>
